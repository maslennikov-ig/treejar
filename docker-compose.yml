services:
  db:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    environment:
      POSTGRES_USER: treejar
      POSTGRES_PASSWORD: treejarpassword
      POSTGRES_DB: treejar
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build: .
    command: web
    ports:
      - "8002:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  worker:
    build: .
    command: worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  db-data:
