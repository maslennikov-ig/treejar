schema_version = 2
role = "orchestrator-stage"
beads_dir = ".beads"
handoff_file = ".codex/handoff.md"
stage_summary_path_template = ".codex/stages/{stage_id}/summary.md"
artifact_template = ".codex/stage-artifact-template.md"
artifact_path_template = ".codex/stages/{stage_id}/artifacts/{task_id}.md"

[workspace]
multi_repo = false
launch_mode = "direct_or_orchestrated"

[baseline]
profile = "balanced-v2.14"
source_skill = "orchestration-setup"

[execution]
default_mode = "hybrid"
simple_task_max_files = 2
simple_task_max_minutes = 15

[autonomy]
default_mode = "act_on_reversible_local_changes"
act_without_asking = [
  "read_repo_files",
  "edit_tracked_repo_files",
  "update_repo_local_orchestration_contracts",
  "run_local_verification",
  "update_beads_when_task_truth_is_clear",
]
ask_before = [
  "destructive_or_irreversible_actions",
  "high_impact_externally_visible_actions_not_explicitly_required",
  "deploy_or_prod_staging_mutation",
  "permission_scope_expansion",
  "force_push_or_history_rewrite",
  "material_requirement_ambiguity",
]

[handoff]
mode = "current_state_plus_stages"
current_state_max_lines = 200
legacy_archive_dir = ".codex/agent-reports"

[artifacts]
tracked_in_git = true
format = "frontmatter_plus_short_note"
sensitivity = "internal_no_secrets"

[completion_inbox]
scope = "git_common_dir"
transport = "local_ndjson"
events_file = "codex-orchestration/completions.ndjson"
review_state_file = "codex-orchestration/review-state.json"
report_entrypoint = "scripts/orchestration/report_child_completion.py"
review_entrypoint = "scripts/orchestration/review_completion_inbox.py"

[docs]
required_read_paths = [
  "AGENTS.md",
  "README.md",
  ".codex/handoff.md",
]
optional_read_paths = [
  ".codex/config.toml",
  "docs/reports/code-reviews/2026-04/CR-2026-04-02-main-only-workflow-review.md",
]
stage_close_update_paths = [
  ".codex/handoff.md",
  ".codex/stages",
]
runtime_contract_update_paths = [
  "AGENTS.md",
  "README.md",
  ".codex/handoff.md",
  ".codex/stages",
]
notes = [
  "Keep AGENTS.md short and stable; use this file only for executable or unambiguous repo-local rules.",
  "Do not append execution history into .codex/handoff.md; move material stage history into .codex/stages/.",
]

[delivery]
mode = "main_only"
primary_branch = "main"
pr_required = false

[delegation]
require_base_branch_and_commit = true
require_dedicated_worktree = true
require_strict_write_zone = true
require_clean_git_status = true
require_artifact = true
artifact_fields = [
  "task_id",
  "stage_id",
  "branch",
  "base_branch",
  "base_commit",
  "worktree",
  "status",
  "verification",
  "changed_files",
]
launcher = "codex_subagents"
subagent_visibility = "separate_spawned_threads"
inline_subagents_allowed = false
requires_explicit_user_spawn_request = true
write_heavy_requires_dedicated_worktree = true
worker_isolation = "dedicated_branch_worktree"

parallel_decomposition_matrix = "required_for_medium_complex"
parallel_execution_default = "spawn_all_independent_streams"
sequential_requires_reason = true

[subagent_model_policy]
default_model = "inherit_orchestrator"
default_reasoning_effort = "inherit_orchestrator"
reasoning_policy = "complexity_based"
model_override_requires_current_user_authorization = true
record_model_reasoning_rationale = true
high_reasoning_triggers = [
  "architecture",
  "security",
  "data_migration",
  "cross_module_change",
  "critical_bug",
  "review",
  "ambiguous_requirements",
]

[review]
require_findings_first = true
allowed_decisions = ["merge", "fix", "split", "defer"]

[enforcement]
process_verification_entrypoint = "scripts/orchestration/run_process_verification.sh"
artifact_validator = "scripts/orchestration/validate_artifact.py"
stage_closure_check = "scripts/orchestration/check_stage_ready.py"
stage_closeout_entrypoint = "scripts/orchestration/run_stage_closeout.py"
workspace_cleanup_entrypoint = "scripts/orchestration/cleanup_stage_workspace.py"
artifact_required_for_stage_close = true
handoff_must_reference_stage_on_close = true

[closeout]
phase_model = "stage_then_delivery"
git_automation = "balanced"
clean_state = "strict"
merge_requires_explicit_authorization = true
auto_remove_stage_worktrees = true
auto_delete_local_branch_after_remote_delivery = true

[verification]
process_only_commands = [
  "scripts/orchestration/run_process_verification.sh",
]
code_change_commands = [
  "uv run ruff check src/ tests/",
  "uv run ruff format --check src/ tests/",
  "uv run mypy src/",
  "env DYLD_FALLBACK_LIBRARY_PATH=\"${DYLD_FALLBACK_LIBRARY_PATH:-/opt/homebrew/lib}\" uv run pytest tests/ -v --tb=short",
]

[session_completion]
required_commands = [
  "git pull --rebase",
  "git push",
]
maintenance_commands = [
  "bd bootstrap --yes",
  "bd import",
  "bd export -o .beads/issues.jsonl",
]

[exceptions]
canonical_runtime = "https://noor.starec.ai"
prefer_direct_opt_noor_triage = true
legacy_reports_dir = ".codex/agent-reports"
