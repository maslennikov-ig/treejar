# Nginx Host Configuration for noor.starec.ai
# Place this in /etc/nginx/sites-available/treejar-prod
# and symlink to /etc/nginx/sites-enabled/

# Rate limiting for webhook
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=10r/s;

server {
    listen 80;
    server_name noor.starec.ai;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name noor.starec.ai;

    # SSL — expected to be managed by certbot
    ssl_certificate /etc/letsencrypt/live/noor.starec.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noor.starec.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /api/v1/webhook/ {
        limit_req zone=webhook_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    access_log /var/log/nginx/noor.access.log;
    error_log /var/log/nginx/noor.error.log;
}
