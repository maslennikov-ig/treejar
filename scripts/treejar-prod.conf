# Nginx Host Configuration for Production Env
# Place this in /etc/nginx/sites-available/treejar-prod
# and symlink to /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name noor.starec.ai;

    # Optional: SSL configuration should go here 
    # (e.g., managed by Certbot)

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
