name: Deploy to VPS

on:
  push:
    branches:
      - master
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # We only deploy if we have the server secrets configured
    # and tests pass (if you want to add a test job dependency later)
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Extract the branch name from the GitHub reference
            BRANCH_NAME=${GITHUB_REF##*/}
            
            # Map 'main' to 'master' if needed for legacy compatibility
            if [ "$BRANCH_NAME" = "main" ]; then
              BRANCH_NAME="master"
            fi
            
            # Navigate to the repository directory
            cd /root/treejar || {
              echo "Repository not found at /root/treejar. Please double check the directory."
              exit 1
            }
            
            # Make sure the script is executable and run it with the target branch
            chmod +x scripts/vps-deploy.sh
            ./scripts/vps-deploy.sh "$BRANCH_NAME"
