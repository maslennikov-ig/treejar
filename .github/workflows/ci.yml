name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true
          save-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true
          save-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: redis://localhost:6379/0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
      APP_ENV: test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true
          save-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    needs: [lint, type-check, test]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    env:
      DEPLOY_DIR: /tmp/treejar-deploy-${{ github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: "2222"
      VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
    steps:
      - uses: actions/checkout@v6
      - name: Package release artifact
        run: |
          set -euo pipefail
          mkdir -p release
          git archive --format=tar HEAD | tar -x -C release
          printf '%s\n' "$GITHUB_SHA" > release/.release-sha
          printf '%s\n' "$GITHUB_RUN_ID" > release/.release-run-id
          tar -czf treejar-release.tar.gz -C release .
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_treejar_vps
          chmod 600 ~/.ssh/id_treejar_vps
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
      - name: Upload release bundle
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_treejar_vps -p "$VPS_PORT" "$VPS_USERNAME@$VPS_HOST" "rm -rf '$DEPLOY_DIR' && mkdir -p '$DEPLOY_DIR/scripts'"
          scp -i ~/.ssh/id_treejar_vps -P "$VPS_PORT" treejar-release.tar.gz "$VPS_USERNAME@$VPS_HOST:$DEPLOY_DIR/treejar-release.tar.gz"
          scp -i ~/.ssh/id_treejar_vps -P "$VPS_PORT" scripts/vps-deploy.sh "$VPS_USERNAME@$VPS_HOST:$DEPLOY_DIR/scripts/vps-deploy.sh"
      - name: Deploy release on VPS
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_treejar_vps -p "$VPS_PORT" "$VPS_USERNAME@$VPS_HOST" "
            chmod +x '$DEPLOY_DIR/scripts/vps-deploy.sh' &&
            '$DEPLOY_DIR/scripts/vps-deploy.sh' \
              --archive '$DEPLOY_DIR/treejar-release.tar.gz' \
              --target-dir '/opt/noor' \
              --health-url 'http://127.0.0.1:8002/api/v1/health' &&
            rm -rf '$DEPLOY_DIR'
          "
