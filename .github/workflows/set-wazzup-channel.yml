name: Set WAZZUP_CHANNEL_ID on VPS (one-time)

on:
  workflow_dispatch:
    inputs:
      channel_id:
        description: 'Wazzup channelId (UUID)'
        required: false
        default: ''
      check_logs:
        description: 'Set to true to only check logs'
        required: false
        default: 'false'

permissions: {}

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Execute on VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 2222
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/noor

            if [ "${{ github.event.inputs.check_logs }}" = "true" ]; then
              echo "=== LAST 150 LINES: APP ==="
              docker compose logs --tail=150 --no-color app 2>&1

              echo ""
              echo "=== LAST 80 LINES: WORKER ==="
              docker compose logs --tail=80 --no-color worker 2>&1

              echo ""
              echo "=== CONTAINER STATUS ==="
              docker compose ps 2>&1

              echo ""
              echo "=== ENV CHECK ==="
              grep "WAZZUP" .env 2>&1
              exit 0
            fi

            CHANNEL_ID="${{ github.event.inputs.channel_id }}"
            if [ -z "$CHANNEL_ID" ]; then
              echo "Error: channel_id is required when not checking logs"
              exit 1
            fi

            sed -i '/^WAZZUP_CHANNEL_ID=/d' .env
            echo "WAZZUP_CHANNEL_ID=${CHANNEL_ID}" >> .env
            echo "✅ WAZZUP_CHANNEL_ID set to ${CHANNEL_ID}"
            grep "WAZZUP_CHANNEL_ID" .env

            docker compose up -d app worker
            echo "✅ Containers restarted"
